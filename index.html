<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>【山随平野尽】瓦手在榜赋能打手</title>
    <script src="https://cdn.tailwindcss.com">
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'valo-red': '#FF4655',
                        'valo-dark-bg': '#0e141e',
                        'valo-gray': '#8b8f9a',
                    },
                    fontFamily: {
                        sans: ['Inter', 'Noto Sans SC', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #0e141e;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            padding: 20px 20px 30px;
            color: #fff;
            position: relative;
            overflow-x: hidden;
            animation: bodyFadeIn 0.4s ease-out both;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
        }
        @keyframes bodyFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .bg-decor {
            position: absolute;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .decor-line {
            position: absolute;
            background: rgba(255, 70, 85, 0.2);
        }
        .line-tl {
            top: 6%;
            left: 10%;
            width: 60px;
            height: 1px;
        }
        .line-br {
            bottom: 20%;
            right: 10%;
            width: 1px;
            height: 120px;
        }
        .decor-text-vertical {
            position: absolute;
            right: 12px;
            top: 25%;
            color: rgba(255, 70, 85, 0.15);
            font-size: 10px;
            letter-spacing: 3px;
            writing-mode: vertical-rl;
            font-weight: 500;
            animation: decorFadeInRight 0.9s cubic-bezier(0.23, 1, 0.32, 1) 0.3s both;
        }
        .decor-text-vertical-left {
            position: absolute;
            left: 12px;
            bottom: 20%;
            color: rgba(255, 70, 85, 0.1);
            font-size: 10px;
            letter-spacing: 2px;
            writing-mode: vertical-rl;
            transform: rotate(180deg);
            animation: decorFadeInLeft 0.9s cubic-bezier(0.23, 1, 0.32, 1) 0.4s both;
        }
        @keyframes decorFadeInRight {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes decorFadeInLeft {
            from { opacity: 0; transform: rotate(180deg) translateX(20px); }
            to { opacity: 1; transform: rotate(180deg) translateX(0); }
        }
        .bg-ghost-val {
            position: absolute;
            top: 15%;
            left: -5%;
            font-size: 110px;
            font-weight: 900;
            color: rgba(255, 70, 85, 0.03);
            letter-spacing: 15px;
            transform: rotate(-10deg);
            white-space: nowrap;
            pointer-events: none;
            animation: ghostAppear 1s ease-out 0.2s both;
        }
        @keyframes ghostAppear {
            from { opacity: 0; transform: rotate(-10deg) scale(0.95); }
            to { opacity: 1; transform: rotate(-10deg) scale(1); }
        }
        .logo-img {
            max-width: 120px;
            max-height: 120px;
            width: auto;
            height: auto;
            object-fit: contain;
            filter: drop-shadow(0 4px 12px rgba(255, 70, 85, 0.3));
            opacity: 0;
            transform: translateY(-15px) scale(0.9);
            animation: logoSpringIn 0.65s cubic-bezier(0.34, 1.56, 0.64, 1) 0.15s forwards;
        }
        @keyframes logoSpringIn {
            0% { opacity: 0; transform: translateY(-15px) scale(0.9); }
            60% { opacity: 1; transform: translateY(3px) scale(1.02); }
            80% { transform: translateY(-1px) scale(0.99); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        .title-main {
            font-weight: 800;
            letter-spacing: 1px;
            background: linear-gradient(180deg, #FF4655 0%, #e63a48 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 2.8rem;
            opacity: 0;
            transform: translateY(12px);
            animation: titleFadeUp 0.5s ease-out 0.35s forwards;
        }
        .title-sub {
            color: #FF4655;
            letter-spacing: 0.45em;
            font-weight: 500;
            margin-top: -6px;
            font-size: 1rem;
            opacity: 0;
            transform: translateY(8px);
            animation: titleFadeUp 0.45s ease-out 0.45s forwards;
        }
        @keyframes titleFadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .btn-valo {
            background-color: #FF4655;
            color: white;
            font-weight: 700;
            border: none;
            width: 100%;
            padding: 14px 0;
            font-size: 1.15rem;
            clip-path: polygon(5% 0, 95% 0, 100% 15%, 100% 98%, 0 98%, 0 15%);
            border-bottom-left-radius: 8px;
            border-bottom-right-radius: 8px;
            box-shadow: 0 6px 18px rgba(255, 70, 85, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin: 0 auto;
            line-height: 1.5;
            cursor: pointer;
            transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1),
                        background-color 0.2s ease,
                        box-shadow 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            transform: translateZ(0);
            backface-visibility: hidden;
        }
        .btn-valo:active {
            transform: scale(0.95) translateZ(0);
            background-color: #d93a46;
            box-shadow: 0 3px 10px rgba(255, 70, 85, 0.4);
            transition: transform 0.1s ease,
                        background-color 0.08s ease,
                        box-shadow 0.1s ease;
        }
        .btn-valo img.icon-img {
            width: 32px;
            height: 32px;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
            object-fit: contain;
            pointer-events: none;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .btn-valo:active img.icon-img {
            transform: scale(0.9);
            transition: transform 0.08s ease;
        }
        .btn-valo .icon-xl {
            width: 56px;
            height: 56px;
        }
        .btn-animate-1 {
            opacity: 0;
            transform: translateY(35px) scale(0.92) translateZ(0);
            animation: btnSpringIn 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) 0.55s forwards;
        }
        .btn-animate-2 {
            opacity: 0;
            transform: translateY(35px) scale(0.92) translateZ(0);
            animation: btnSpringIn 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) 0.7s forwards;
        }
        .btn-animate-3 {
            opacity: 0;
            transform: translateY(35px) scale(0.92) translateZ(0);
            animation: btnSpringIn 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) 0.85s forwards;
        }
        @keyframes btnSpringIn {
            0% { opacity: 0; transform: translateY(35px) scale(0.92) translateZ(0); }
            60% { opacity: 1; transform: translateY(-4px) scale(1.01) translateZ(0); }
            80% { transform: translateY(2px) scale(0.99) translateZ(0); }
            100% { opacity: 1; transform: translateY(0) scale(1) translateZ(0); }
        }
        .btn-valo::after {
            content: '';
            position: absolute;
            top: -30%;
            left: -120%;
            width: 60%;
            height: 160%;
            background: linear-gradient(105deg,
                    transparent 35%,
                    rgba(255,255,255,0.06) 40%,
                    rgba(255,255,255,0.15) 45%,
                    rgba(255,255,255,0.06) 50%,
                    transparent 55%);
            pointer-events: none;
            z-index: 2;
        }
        .btn-animate-1::after { animation: shimmerSweep 1s ease-out 1.1s both; }
        .btn-animate-2::after { animation: shimmerSweep 1s ease-out 1.3s both; }
        .btn-animate-3::after { animation: shimmerSweep 1s ease-out 1.5s both; }
        @keyframes shimmerSweep {
            from { left: -120%; }
            to { left: 130%; }
        }
        .login-group {
            width: 100%;
            max-width: 400px;
        }
        .footer-area {
            width: 100%;
            max-width: 400px;
        }
        .riot-brand {
            font-size: 10px;
            color: #3a4250;
            letter-spacing: 6px;
            opacity: 0;
            animation: riotFadeIn 0.5s ease-out 1.0s forwards;
        }
        @keyframes riotFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @media (max-width: 380px) {
            .title-main { font-size: 2.2rem; }
            .btn-valo { font-size: 1rem; padding: 12px 0; }
            .btn-valo .icon-xl { width: 44px; height: 44px; }
            .btn-valo img.icon-img { width: 26px; height: 26px; }
            .bg-ghost-val { font-size: 70px; top: 12%; left: -8%; }
        }
    </style>
</head>
<body>
    <div class="bg-decor">
        <div class="decor-line line-tl"></div>
        <div class="decor-line line-br"></div>
        <div class="decor-text-vertical">VALORANT</div>
        <div class="decor-text-vertical-left">Riot Games</div>
        <div class="bg-ghost-val">VALORANT</div>
    </div>
    <div class="flex flex-col items-center justify-between w-full flex-1 z-10 pb-2">
        <div class="flex flex-col items-center mt-40 w-full">
            <img src="https://i.imgs.ovh/2026/05/05/ebc1d880d59e5d6d26dbe6c1f4badd9f.webp"
                 alt="无畏契约LOGO" class="logo-img mb-4">
            <h1 class="title-main">无畏契约</h1>
            <p class="title-sub">VALORANT</p>
        </div>
        <div class="login-group flex flex-col gap-4 mt-20">
            <button class="btn-valo btn-animate-1"
                    onclick="let b=this; b.style.transform='scale(0.95) translateZ(0)'; setTimeout(()=>{ window.location.href='https://qm.qq.com/q/6lbUQX9YZO'; }, 100);">
                <img src="https://i.imgs.ovh/2026/05/05/dcf5c2bfa7dc42bc21938097785a0730.webp" alt="联系代练" class="icon-img">
                联系代练
            </button>
            <button class="btn-valo btn-animate-2"
                    onclick="let b=this; b.style.transform='scale(0.95) translateZ(0)'; setTimeout(()=>{ window.location.href='https://p.goofish.com/p/2nn8X9T8'; }, 100);">
                <img src="https://i.imgs.ovh/2026/05/05/5bb0f258414928a13393166f963cc030.png" alt="闲鱼购买" class="icon-img icon-xl">
                闲鱼点单
            </button>
            <button class="btn-valo btn-animate-3"
                    onclick="let b=this; b.style.transform='scale(0.95) translateZ(0)'; setTimeout(()=>{ window.location.href='https://webnote.cc/%E7%93%A6%E6%89%8B%E4%BB%A3%E7%BB%83%E4%BB%B7%E6%A0%BC%E8%A1%A8'; }, 100);">
                <img src="https://i.imgs.ovh/2026/05/05/de87dfd4cf9e7fb24ccb354c3ac21dbf.webp" alt="代练价格" class="icon-img">
                代练价格
            </button>
        </div>
        <div class="footer-area flex flex-col items-center mt-16">
            <div class="riot-brand">—— R I O T ——</div>
        </div>
    </div>
    <!-- 背景音乐自动循环脚本 -->
    <script>
        (function() {
            const tracks = ['1.mp3', '2.mp3'];
            let currentTrack = null;
            let isPlaying = false;
            const audio = new Audio();
            audio.volume = 0.5; // 适当音量，可调整
            // 播放下一首（自动切换到另一首）
            function playNext() {
                // 如果当前是1.mp3则播2.mp3，反之亦然
                const nextTrack = (currentTrack === tracks[0]) ? tracks[1] : tracks[0];
                currentTrack = nextTrack;
                audio.src = currentTrack;
                audio.play().catch(() => {});
            }
            // 歌曲播放结束后自动切歌
            audio.addEventListener('ended', playNext);
            // 初次随机选一首并尝试播放
            function startPlayback() {
                if (isPlaying) return;
                currentTrack = tracks[Math.floor(Math.random() * tracks.length)];
                audio.src = currentTrack;
                audio.play().then(() => {
                    isPlaying = true;
                }).catch(() => {
                    // 自动播放被浏览器拦截，需要等待用户交互
                });
            }
            // 立刻尝试自动播放
            startPlayback();
            // 若自动播放被阻止，监听用户首次点击/触摸
            function enableAudioOnInteraction() {
                if (!isPlaying) {
                    startPlayback();
                }
                document.removeEventListener('click', enableAudioOnInteraction);
                document.removeEventListener('touchstart', enableAudioOnInteraction);
            }
            document.addEventListener('click', enableAudioOnInteraction, { once: true });
            document.addEventListener('touchstart', enableAudioOnInteraction, { once: true });
        })();
    </script>
</body>
</html>
